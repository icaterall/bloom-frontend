<!-- Mobile backdrop -->
@if (!sidebarCollapsed && isMobile) {
  <div
    class="fixed inset-0 z-30 bg-slate-900/40 backdrop-blur-sm lg:hidden"
    (click)="closeMobile()">
  </div>
}

<div class="flex min-h-screen bg-slate-50/60">

  <!-- ── Sidebar ── -->
  <aside
    class="group/sidebar flex flex-col h-screen bg-[#0f1d3d] border-r border-[#1a2d5a]
           transition-all duration-300 ease-[cubic-bezier(0.16,1,0.3,1)] z-40 overflow-hidden"
    [class.w-[15rem]]="!sidebarCollapsed"
    [class.w-[4.5rem]]="sidebarCollapsed && !isMobile"
    [class.fixed]="isMobile"
    [class.translate-x-0]="!sidebarCollapsed || !isMobile"
    [class.-translate-x-full]="sidebarCollapsed && isMobile"
    [class.shadow-2xl]="isMobile && !sidebarCollapsed"
  >
    <!-- Brand Header -->
    <div class="flex items-center justify-between h-16 px-4 border-b border-white/10 shrink-0">
      <div class="flex items-center">
        <button
          (click)="navigateToDashboard()"
          class="flex items-center justify-center w-10 h-10 rounded-xl
                 bg-[#2663eb] shrink-0 shadow-md shadow-blue-500/20
                 hover:shadow-lg hover:shadow-blue-500/30
                 transition-shadow duration-200"
        >
          <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" />
            <path d="M8 14s1.5 2 4 2 4-2 4-2" />
            <circle cx="9" cy="9" r="1" fill="currentColor" />
            <circle cx="15" cy="9" r="1" fill="currentColor" />
          </svg>
        </button>

        @if (!sidebarCollapsed) {
          <div class="ml-3 overflow-hidden">
            <p class="text-sm font-bold text-white truncate leading-tight tracking-tight">
              Bloom Spectrum
            </p>
            <p class="text-[0.625rem] text-blue-300/60 font-semibold uppercase tracking-widest">
              Clinical
            </p>
          </div>
        }
      </div>

      <!-- Collapse toggle -->
      <button
        (click)="toggleCollapse()"
        class="hidden lg:flex items-center justify-center w-7 h-7 rounded
               text-white/40 hover:text-white hover:bg-white/10
               transition-all duration-200"
      >
        <lucide-angular
          [img]="ChevronLeftIcon"
          [size]="16"
          class="transition-transform duration-300"
          [class.rotate-180]="sidebarCollapsed"
        ></lucide-angular>
      </button>
    </div>

    <!-- Navigation Items -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1 sidebar-scrollbar">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="sidebar-active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          (click)="closeMobile()"
          class="group flex items-center gap-3 rounded px-3 py-2.5
                 text-[0.8125rem] font-medium text-blue-200/70
                 transition-all duration-150 ease-[cubic-bezier(0.16,1,0.3,1)]
                 hover:bg-white/10 hover:text-white
                 focus-visible:outline-none focus-visible:ring-2
                 focus-visible:ring-white/30 focus-visible:ring-offset-1 focus-visible:ring-offset-[#0f1d3d]"
          [class.justify-center]="sidebarCollapsed"
          [attr.title]="sidebarCollapsed ? item.label : null"
        >
          <lucide-angular
            [img]="item.icon"
            [size]="20"
            class="shrink-0 transition-colors duration-150"
          ></lucide-angular>

          @if (!sidebarCollapsed) {
            <span class="truncate">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Logout -->
    <div class="mt-auto border-t border-white/10 px-3 py-3 shrink-0">
      <button
        type="button"
        (click)="logout()"
        class="flex items-center w-full gap-3 rounded px-3 py-2.5
               text-[0.8125rem] font-medium text-red-400/70
               hover:bg-red-500/10 hover:text-red-300
               transition-all duration-150 ease-[cubic-bezier(0.16,1,0.3,1)]
               focus-visible:outline-none focus-visible:ring-2
               focus-visible:ring-red-400/40 focus-visible:ring-offset-1 focus-visible:ring-offset-[#0f1d3d]"
        [class.justify-center]="sidebarCollapsed"
      >
        <lucide-angular [img]="LogOutIcon" [size]="20" class="shrink-0"></lucide-angular>
        @if (!sidebarCollapsed) {
          <span>Logout</span>
        }
      </button>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <main class="flex-1 overflow-y-auto">
      <div class="px-4 py-6 sm:px-6 lg:px-8">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
