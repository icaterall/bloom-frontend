<!-- ═══════════════════════════════════════════
     Bloom Spectrum – Admin Top Header Bar
     ═══════════════════════════════════════════ -->
<header class="h-16 shrink-0 bg-white/80 backdrop-blur-md border-b border-slate-200/60 z-20">
  <div class="flex items-center justify-between h-full px-4 sm:px-6 lg:px-8">

    <!-- Left: Breadcrumb / Page Title -->
    <div class="flex items-center gap-3">
      <a routerLink="/admin/dashboard" class="flex items-center gap-2 group">
        <h1 class="text-lg font-bold text-[#2663eb] tracking-tight
                   group-hover:text-blue-700 transition-colors duration-150">
          Bloom Spectrum Centre
        </h1>
      </a>
      <span class="hidden sm:inline-flex px-2.5 py-0.5 text-[0.65rem] font-semibold
                   rounded-full bg-blue-50 text-[#2663eb] border border-blue-100
                   uppercase tracking-wide">
        Admin
      </span>
    </div>

    <!-- Right: Actions & Profile -->
    <div class="flex items-center gap-2">
      <!-- Search -->
      <button class="p-2 rounded-xl text-slate-400 hover:text-slate-600 hover:bg-slate-100
                     transition-all duration-150 focus-visible:outline-none
                     focus-visible:ring-2 focus-visible:ring-[#2663eb]/40">
        <lucide-angular [img]="SearchIcon" [size]="20"></lucide-angular>
      </button>

      <!-- Notifications -->
      <button class="relative p-2 rounded-xl text-slate-400 hover:text-slate-600
                     hover:bg-slate-100 transition-all duration-150
                     focus-visible:outline-none focus-visible:ring-2
                     focus-visible:ring-[#2663eb]/40">
        <lucide-angular [img]="BellIcon" [size]="20"></lucide-angular>
        <!-- Unread dot -->
        <span class="absolute top-1.5 right-1.5 h-2 w-2 rounded-full bg-red-500
                     ring-2 ring-white"></span>
      </button>

      <!-- Settings -->
      <button type="button" routerLink="/admin/settings"
              class="p-2 rounded-xl text-slate-400 hover:text-slate-600 hover:bg-slate-100
                     transition-all duration-150 focus-visible:outline-none
                     focus-visible:ring-2 focus-visible:ring-[#2663eb]/40">
        <lucide-angular [img]="SettingsIcon" [size]="20"></lucide-angular>
      </button>

      <!-- Divider -->
      <div class="hidden sm:block h-8 w-px bg-slate-200 mx-1"></div>

      <!-- User Profile Capsule -->
      <div class="flex items-center gap-3 pl-1">
        <div class="hidden sm:block text-right">
          <p class="text-sm font-semibold text-slate-800 leading-tight">
            {{ currentUser?.name }}
          </p>
          <p class="text-[0.65rem] text-slate-400 leading-tight">
            {{ currentUser?.email }}
          </p>
        </div>
        <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-[#2663eb] to-indigo-600
                    flex items-center justify-center text-sm font-bold text-white
                    shadow-md shadow-blue-500/20">
          {{ userInitial }}
        </div>
      </div>
    </div>
  </div>
</header>
